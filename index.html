<script>
/* =====================================================
   ✨ ULTRA MOBILE PERFORMANCE ENGINE v1.0
   Optimización automática para celulares
   ===================================================== */

(function(){

/* -------------------------------
   1. ACTIVAR GPU ACCELERATION
--------------------------------*/
const gpuCSS = document.createElement("style");
gpuCSS.innerHTML = `
*,
*::before,
*::after{
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

.gpu{
  transform:translateZ(0);
  will-change:transform,opacity;
}

.sparkle,.star,.princess-card,.castle-svg,
.music-note,.whatsapp-btn,.cf-card,.princess-img{
  transform:translate3d(0,0,0);
  will-change:transform,opacity;
}

.pause-anim *{
  animation-play-state:paused !important;
}

/* modo ahorro automático */
.low-performance *{
  animation-duration: calc(var(--animSpeed,1) * 1.6s) !important;
}

.low-performance .castle-svg{
  filter: drop-shadow(0 0 10px rgba(255,215,0,.4));
}

.low-performance .event-section{
  backdrop-filter: blur(5px);
}
`;
document.head.appendChild(gpuCSS);


/* -------------------------------
   2. AUTO PAUSE (cuando cambia app)
--------------------------------*/
document.addEventListener("visibilitychange",()=>{
  document.body.classList.toggle(
    "pause-anim",
    document.hidden
  );
});


/* -------------------------------
   3. DETECTOR DE FPS REAL
   (la magia principal)
--------------------------------*/
let frames = 0;
let lastTime = performance.now();
let fps = 60;

function fpsMonitor(time){
  frames++;

  if(time > lastTime + 1000){
    fps = frames;
    frames = 0;
    lastTime = time;
    adaptivePerformance(fps);
  }

  requestAnimationFrame(fpsMonitor);
}

requestAnimationFrame(fpsMonitor);


/* -------------------------------
   4. MOTOR ADAPTATIVO INTELIGENTE
--------------------------------*/
let lowMode = false;

function adaptivePerformance(currentFPS){

  // si el celular empieza a sufrir
  if(currentFPS < 40 && !lowMode){
    lowMode = true;
    enableLowPerformanceMode();
  }

  // si vuelve a estar fluido
  if(currentFPS > 52 && lowMode){
    lowMode = false;
    disableLowPerformanceMode();
  }
}


/* -------------------------------
   5. MODO BAJO CONSUMO (invisible)
--------------------------------*/
function enableLowPerformanceMode(){

  document.body.classList.add("low-performance");

  // reducir partículas activas
  document.querySelectorAll(".sparkle")
    .forEach((el,i)=>{
      if(i % 2 === 0) el.style.display="none";
    });

  // reducir estrellas
  document.querySelectorAll(".star")
    .forEach((el,i)=>{
      if(i % 3 === 0) el.style.opacity=".4";
    });

  // limitar canvas FPS si existe
  if(window.fireworksLoop){
      window.fireworksFPS = 25;
  }

  console.log("⚡ Ultra Mode: ahorro activado");
}


/* -------------------------------
   6. RESTAURAR CALIDAD
--------------------------------*/
function disableLowPerformanceMode(){

  document.body.classList.remove("low-performance");

  document.querySelectorAll(".sparkle")
    .forEach(el=>el.style.display="");

  document.querySelectorAll(".star")
    .forEach(el=>el.style.opacity="");

  if(window.fireworksLoop){
      window.fireworksFPS = 60;
  }

  console.log("✨ Ultra Mode: calidad restaurada");
}


/* -------------------------------
   7. OPTIMIZAR SCROLL MOBILE
--------------------------------*/
let ticking=false;

window.addEventListener("scroll",()=>{
  if(!ticking){
    requestAnimationFrame(()=>{
      document.body.style.setProperty(
        "--scrollY",
        window.scrollY
      );
      ticking=false;
    });
    ticking=true;
  }
},{passive:true});


/* -------------------------------
   8. OPTIMIZAR IMÁGENES AUTOMÁTICO
--------------------------------*/
document.querySelectorAll("img").forEach(img=>{
  img.loading="lazy";
  img.decoding="async";
});


/* -------------------------------
   9. REDUCIR CALOR EN ANDROID
--------------------------------*/
if(navigator.hardwareConcurrency &&
   navigator.hardwareConcurrency <=4){

   document.body.classList.add("low-performance");
}


/* -------------------------------
   10. PREVENIR MEMORY LEAKS
--------------------------------*/
setInterval(()=>{
  if(window.gc){
    try{ window.gc(); }catch(e){}
  }
},30000);


})();
</script>
